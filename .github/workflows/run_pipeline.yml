name: NBA Stock Market Update Pipeline

# Controls when the action will run
on:
  schedule:
    # Triggers automatically every single day at 7:00 AM UTC (11:00 PM PST)
    - cron: '0 7 * * *'
  workflow_dispatch:
    # Keeps your manual button active so you can test it whenever you want!

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Clone your repository code onto the virtual runner
      - name: Check out repository code
        uses: actions/checkout@v3

      # Step 2: Set up a reliable Python environment
      - name: Set up Python Environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # Step 3: Install dependencies (Included pytz for precise Pacific Time syncing)
      - name: Install Project Dependencies
        run: |
          pip install "urllib3<2.0" nba_api postgrest pytz

      # Step 4: Run diagnostic check and execute pipeline transaction
      - name: Execute Pipeline Engine Transaction
        run: |
          echo "=== RUNNER DIAGNOSTICS ==="
          pwd
          echo "--- Files Present ---"
          ls -la
          echo "--- Script File Tail End View ---"
          tail -n 10 pipeline_engine.py || echo "Target file missing or unreadable!"
          echo "=== RUNNING ENGINE ==="
          python pipeline_engine.py

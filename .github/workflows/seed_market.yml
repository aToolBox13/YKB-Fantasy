name: NBA Marketplace Seeding Run

on:
  workflow_dispatch: # This adds the manual "Run workflow" button in GitHub

jobs:
  run-seed:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-with-history: '3.10'
        cache: 'pip'

    - name: Install System Dependencies
      run: |
        pip install nba_api supabase

    - name: Execute One-Time Dynamic Seeding
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: python nba_seed.py

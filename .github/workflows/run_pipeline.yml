name: NBA Stock Market Update Pipeline

# Controls when the action will run
on:
  schedule:
    # Triggers automatically every single day at 6:00 AM UTC (11:00 PM PST)
    - cron: '0 7 * * *'
  workflow_dispatch:
    # Keeps your manual button active so you can test it whenever you want!

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Clone your repository code onto the virtual runner
      - name: Check out repository code
        uses: actions/checkout@v3

      # Step 2: Set up a reliable Python environment
      - name: Set up Python Environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # Step 3: Install dependencies with strict versioning to prevent connection failures
      - name: Install Project Dependencies
        run: |
          pip install "urllib3<2.0" nba_api postgrest

      # Step 4: Run the unified execution script to update both price and history
      - name: Execute Pipeline Engine Transaction
        run: |
          python pipeline_engine.py

name: NBA Live Market Pump

on:
  schedule:
    # This runs the script every 10 minutes
    - cron: '*/10 * * * *'
  # This button lets you run it manually from the Actions tab anytime
  workflow_dispatch:

jobs:
  run-pump:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code from Repo
      uses: actions/checkout@v4

    - name: Setup Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install NBA Packages
      run: |
        pip install -r requirements.txt

    - name: Execute Live Price Sync
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: python nba_pump.py
